info:
  contact: {}
  description: REST API for the Galactic Sovereign backend service.
  title: Galactic Sovereign API
  version: "1.0"
paths:
  /actions/{id}:
    delete:
      description: Deletes an existing building action.
      parameters:
      - description: Action id (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: Delete building action
      tags:
      - actions
  /healthcheck:
    get:
      description: Returns service health based on database connectivity.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: Health check
      tags:
      - healthcheck
  /planets:
    get:
      description: Returns planets, optionally filtered by player id.
      parameters:
      - description: Player id (UUID)
        in: query
        name: player
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-array_communication_PlanetDtoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: List planets
      tags:
      - planets
    post:
      consumes:
      - application/json
      description: Creates a planet from the provided payload.
      parameters:
      - description: Planet payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/communication.PlanetDtoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-communication_PlanetDtoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: Create planet
      tags:
      - planets
  /planets/{id}:
    delete:
      description: Deletes a planet by id.
      parameters:
      - description: Planet id (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: Delete planet
      tags:
      - planets
    get:
      description: Returns a planet and all related game data.
      parameters:
      - description: Planet id (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-communication_FullPlanetDtoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: Get planet
      tags:
      - planets
  /planets/{id}/actions:
    post:
      consumes:
      - application/json
      description: Creates a building action for the planet provided in path parameter.
        The planet field in the body is ignored and replaced with this path value.
      parameters:
      - description: Planet id (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Building action payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/communication.BuildingActionDtoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-communication_BuildingActionDtoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: Create building action
      tags:
      - actions
  /players:
    get:
      description: Returns players, optionally filtered by api_user.
      parameters:
      - description: API user id (UUID)
        in: query
        name: api_user
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-array_communication_PlayerDtoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: List players
      tags:
      - players
  /players/{id}:
    delete:
      description: Deletes a player by id.
      parameters:
      - description: Player id (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: Delete player
      tags:
      - players
    get:
      description: Returns a player by id.
      parameters:
      - description: Player id (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-communication_PlayerDtoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: Get player
      tags:
      - players
  /universes:
    get:
      description: Returns all universes.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-array_communication_UniverseDtoResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: List universes
      tags:
      - universes
  /universes/{id}:
    delete:
      description: Deletes a universe by id.
      parameters:
      - description: Universe id (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: Delete universe
      tags:
      - universes
    get:
      description: Returns a universe and related resources/buildings.
      parameters:
      - description: Universe id (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-communication_FullUniverseDtoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ResponseEnvelope-string'
      summary: Get universe
      tags:
      - universes
swagger: "2.0"
